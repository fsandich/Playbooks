---
- name: Llamada MTLS a BAC usando certs del repo
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    api_url: "https://bacremesasdesa.corp.redbac.com/gateway/auth/v1/aplicacion"

    # Destino en RHEL (control node o runner)
    certs_dest_dir: "/opt/certs/bac"

    client_cert_dest: "{{ certs_dest_dir }}/rmf_client.crt"
    client_key_dest:  "{{ certs_dest_dir }}/rmf_client.key"
    ca_cert_dest:     "{{ certs_dest_dir }}/bac_chain.pem"

    # Rutas en el repo
    client_cert_src: "files/certs/rmf_client.crt"
    client_key_src:  "files/certs/rmf_client.key"
    ca_cert_src:     "files/certs/bac_chain.pem"

    request_body:
      Perfil: "Staging"
      Aplicacion: "RMF.CLIENT.ANSIBLE"
      Certificado: "1b000013786aabdc6326c4bb32000000001378"

  tasks:
    - name: Crear directorio destino para certs
      ansible.builtin.file:
        path: "{{ certs_dest_dir }}"
        state: directory
        mode: "0700"

    - name: Copiar cert cliente desde el repo
      ansible.builtin.copy:
        src: "{{ client_cert_src }}"
        dest: "{{ client_cert_dest }}"
        mode: "0600"

    - name: Copiar key cliente desde el repo
      ansible.builtin.copy:
        src: "{{ client_key_src }}"
        dest: "{{ client_key_dest }}"
        mode: "0600"

    - name: Copiar cadena de CA desde el repo
      ansible.builtin.copy:
        src: "{{ ca_cert_src }}"
        dest: "{{ ca_cert_dest }}"
        mode: "0644"

    - name: Verificar cert cliente
      ansible.builtin.command: >
        openssl x509 -in {{ client_cert_dest }} -noout -subject
      register: certcheck
      changed_when: false
      failed_when: certcheck.rc != 0

    - name: Verificar key cliente
      ansible.builtin.command: >
        openssl rsa -in {{ client_key_dest }} -check -noout
      register: keycheck
      changed_when: false
      failed_when: keycheck.rc != 0

    - name: Verificar CA chain
      ansible.builtin.command: >
        openssl x509 -in {{ ca_cert_dest }} -noout -subject -issuer
      register: cacheck
      changed_when: false
      failed_when: cacheck.rc != 0

    - name: Llamada MTLS a BAC
      ansible.builtin.uri:
        url: "{{ api_url }}"
        method: POST
        body: "{{ request_body | to_nice_json }}"
        body_format: json
        client_cert: "{{ client_cert_dest }}"
        client_key:  "{{ client_key_dest }}"
        ca_path:     "{{ ca_cert_dest }}"
        validate_certs: true
        return_content: true
        headers:
          Content-Type: "application/json"
        status_code: 200
        timeout: 60
      register: mtls_response

    - name: Mostrar respuesta
      ansible.builtin.debug:
        var: mtls_response








---
- name: Llamada MTLS usando .pfx en un solo play
  hosts: localhost
  gather_facts: false
  vars:
    api_url: "https://tu-endpoint/alguna/ruta"
    workdir: "/tmp/mtls_cert"        # directorio temporal
    pfx_src: "files/certificado.pfx" # ruta en tu repo Ansible
    pfx_dest: "{{ workdir }}/certificado.pfx"
    pfx_password: "{{ vault_pfx_password }}"  # desde Vault

    client_key_enc: "{{ workdir }}/client-encrypted.key"
    client_key: "{{ workdir }}/client.key"
    client_crt: "{{ workdir }}/client.crt"

    # si usas CA propia:
    ca_cert_path: "/etc/pki/ca-trust/source/anchors/mi-ca.pem"

    request_body:
      perfil: "stagging"
      Aplicacion: "RMF.Client"
      Certificado: "1b0000001276...."

  tasks:
    - name: Crear directorio temporal
      ansible.builtin.file:
        path: "{{ workdir }}"
        state: directory
        mode: "0700"

    - name: Copiar .pfx al host (localhost)
      ansible.builtin.copy:
        src: "{{ pfx_src }}"
        dest: "{{ pfx_dest }}"
        mode: "0600"

    - name: Extraer clave privada cifrada desde .pfx
      ansible.builtin.command: >
        openssl pkcs12 -in {{ pfx_dest }}
        -nocerts
        -out {{ client_key_enc }}
        -passin pass:{{ pfx_password }}
        -passout pass:{{ pfx_password }}
      args:
        creates: "{{ client_key_enc }}"

    - name: Quitar passphrase y generar client.key
      ansible.builtin.command: >
        openssl rsa
        -in {{ client_key_enc }}
        -out {{ client_key }}
        -passin pass:{{ pfx_password }}
      args:
        creates: "{{ client_key }}"

    - name: Extraer certificado público client.crt desde .pfx
      ansible.builtin.command: >
        openssl pkcs12 -in {{ pfx_dest }}
        -clcerts -nokeys
        -out {{ client_crt }}
        -passin pass:{{ pfx_password }}
      args:
        creates: "{{ client_crt }}"

    - name: Llamada MTLS con uri usando cert/key generados
      ansible.builtin.uri:
        url: "{{ api_url }}"
        method: POST
        body: "{{ request_body | to_nice_json }}"
        body_format: json
        client_cert: "{{ client_crt }}"
        client_key: "{{ client_key }}"
        ca_path: "{{ ca_cert_path }}"   # o quítalo si usas CA pública
        validate_certs: true
        return_content: true
        headers:
          Content-Type: "application/json"
      register: mtls_response

    - debug:
        var: mtls_response

    - name: Limpiar archivos temporales (opcional pero recomendable)
      ansible.builtin.file:
        path: "{{ workdir }}"
        state: absent

---
- name: Verificar que el CA bundle exista
  ansible.builtin.stat:
    path: "{{ ca_bundle_path }}"
  register: ca_stat


- name: Llamar al API para obtener token
  ansible.builtin.uri:
    url: "https://bacremesasdesa.corp.redbac.com/gateway/auth/v1/aplicacion"
    method: POST
    headers:
        Content-Type: "application/json"
    body_format: json
    body:
        Perfil: "Staging"
        Aplicacion: "RMP.CLIENT.ANSIBLE"
        Certificado: "1b000013786aabdc6326c4bb32000000001378"
    return_content: yes
    status_code: 200
    timeout: 60
    validate_certs: true
    ca_path: "{{ ca_bundle_path }}
    register: api_response

- name: Validar estructura de respuesta
  ansible.builtin.assert:
    that:
      - "{{ api_response.json is defined }}"
      - "{{ api_response.json.contenido is defined }}"
      - "{{ api_response.json.contenido.token is defined }}"
    fail_msg: >-
      La respuesta no contiene 'contenido.token'. Respuesta: {{ api_response.content | default(api_response, true) }}
  no_log: true


- name: Guardar token
  ansible.builtin.set_fact:
    mi_token: "{{ api_response.json.contenido.token }}"
  no_log: true

- name: Confirmación
  ansible.builtin.debug:
    msg: "Token obtenido correctamente."



